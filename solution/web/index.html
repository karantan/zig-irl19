<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteProbe</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }
    body {
      max-width: 42rem;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    form {
      display: grid;
      gap: 0.75rem;
    }
    input[type="url"] {
      width: 100%;
      padding: 0.5rem;
      font: inherit;
      box-sizing: border-box;
    }
    button {
      width: fit-content;
      padding: 0.5rem 1rem;
      font: inherit;
      cursor: pointer;
    }
    pre {
      background: rgba(127, 127, 127, 0.15);
      padding: 1rem;
      overflow-x: auto;
      border-radius: 0.5rem;
      min-height: 4rem;
    }
    .error { color: #c0392b; }
    .ok { color: #27ae60; }
    .hint { opacity: 0.8; font-size: 0.9rem; }
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.85rem;
      background: rgba(127, 127, 127, 0.2);
    }
  </style>
</head>
<body>
  <h1>SiteProbe</h1>
  <p class="hint">
    Run <code>zig build run</code> from <code>solution/</code>.
    Optional WASM: <code>zig build wasm</code> then serve this directory.
  </p>
  <p id="wasm-status" class="hint"></p>

  <form id="probe-form">
    <label for="url">URL</label>
    <input id="url" type="url" required value="https://example.com">
    <button type="submit">Probe</button>
  </form>

  <p id="status"></p>
  <p id="summary"></p>
  <pre id="output">Submit a URL to see the JSON response.</pre>

  <script>
    const API = "http://127.0.0.1:8080";
    let wasmExports = null;

    function validateWithWasm(url) {
      if (!wasmExports?.validateUrl || !wasmExports?.memory) return true;
      const bytes = new TextEncoder().encode(url);
      if (bytes.length > 4096) return false;
      const mem = new Uint8Array(wasmExports.memory.buffer);
      mem.set(bytes, 0);
      return wasmExports.validateUrl(0, bytes.length) !== 0;
    }

    async function loadWasm() {
      const statusEl = document.getElementById("wasm-status");
      try {
        const response = await fetch("./probe.wasm");
        if (!response.ok) throw new Error("probe.wasm not found — run zig build wasm");
        const { instance } = await WebAssembly.instantiateStreaming(response, {});
        wasmExports = instance.exports;
        statusEl.textContent = "WASM validator loaded";
      } catch (error) {
        statusEl.textContent = "WASM unavailable — using server validation only (" + error.message + ")";
      }
    }

    document.getElementById("probe-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const statusEl = document.getElementById("status");
      const summaryEl = document.getElementById("summary");
      const outputEl = document.getElementById("output");
      const url = document.getElementById("url").value.trim();

      statusEl.textContent = "Probing…";
      statusEl.className = "";
      summaryEl.textContent = "";
      outputEl.textContent = "";

      if (!validateWithWasm(url)) {
        statusEl.textContent = "Invalid URL (WASM client check)";
        statusEl.className = "error";
        outputEl.textContent = JSON.stringify({ error: "invalid url" }, null, 2);
        return;
      }

      try {
        const response = await fetch(`${API}/probe`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const body = await response.json();
        outputEl.textContent = JSON.stringify(body, null, 2);
        statusEl.textContent = response.ok ? "OK" : `HTTP ${response.status}`;
        statusEl.className = response.ok ? "ok" : "error";
        if (response.ok && body.ok !== undefined) {
          summaryEl.innerHTML = `<span class="badge">${body.status}</span> ${body.elapsed_ms} ms — ${body.ok ? "healthy" : "unhealthy"}`;
        }
      } catch (error) {
        statusEl.textContent = "Request failed — is the server running?";
        statusEl.className = "error";
        outputEl.textContent = String(error);
      }
    });

    loadWasm();
  </script>
</body>
</html>
